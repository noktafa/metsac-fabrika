<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetSac A.Ş. — Değer Akışı Simülasyonu</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    /* DİKKAT: canvas replaced element'tir — inset:0 tek başına germez (width:auto
       içsel 300×150'ye çözülür); width/height %100 şart. */
    #sahne { position: absolute; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; touch-action: none; }
    #hud { position: absolute; inset: 0; pointer-events: none; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    #hud > * { pointer-events: auto; }
    #yukleniyor {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      color: #e8c170; font-family: ui-monospace, monospace; font-size: 14px; letter-spacing: 2px;
      background: #111; z-index: 99;
    }
  </style>
</head>
<body>
  <canvas id="sahne"></canvas>
  <div id="hud"></div>
  <div id="yukleniyor">MetSac A.Ş. yükleniyor…</div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
